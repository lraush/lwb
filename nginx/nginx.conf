worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript;

  upstream frontend    { server frontend:5173; }
  upstream auth        { server auth-service:3001; }
  upstream tasks       { server task-service:3002; }
  upstream calendar    { server calendar-service:3003; }
  upstream finance     { server finance-service:3004; }
  upstream learning    { server learning-service:3005; }
  upstream health      { server health-service:3006; }
  upstream events      { server events-service:3007; }
  upstream files       { server file-service:3008; }
  upstream ai          { server ai-service:8000; }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=20r/m;

  server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;

    # ── API Routes ───────────────────────────────────
    location /api/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/tasks/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://tasks/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/calendar/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://calendar/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/finance/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://finance/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/learning/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://learning/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/health/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://health/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/events/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://events/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/files/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://files/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ai/ {
      limit_req zone=ai burst=5 nodelay;
      proxy_pass http://ai/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    # WebSocket for AI streaming
    location /api/ai/stream {
      proxy_pass http://ai/stream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
    }

    # ── Frontend (SPA) ───────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
